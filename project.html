<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Room Booking System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; }
        .queue-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 100%; max-width: 800px; margin-bottom: 20px; overflow-x: auto; }
        h2, h3 { text-align: center; color: #1a73e8; margin-bottom: 20px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { border-color: #1a73e8; outline: none; background-color: #f8fbff; }
       
        .btn-submit { background-color: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-submit:hover { background-color: #1557b0; transform: translateY(-1px); }

        /* Admin Buttons */
        .btn-approve { background-color: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-reject { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .status { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; display: none; line-height: 1.6; }
        .success { background-color: #e6fffa; color: #234e52; border: 1px solid #b2f5ea; display: block; }
       
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { color: #1a73e8; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
       
        .priority-high { color: #e53e3e; font-weight: bold; }
        .priority-med { color: #d69e2e; font-weight: bold; }
        .priority-low { color: #38a169; font-weight: bold; }
        .allotted-status { color: #28a745; font-weight: bold; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

<!-- User Booking Form -->
<div class="card">
    <h2>Library Room Request</h2>
    <form id="bookingForm">
        <label for="userName">Full Name</label>
        <input type="text" id="userName" required placeholder="Enter your name">

        <label for="studentId">Student ID / Roll No</label>
        <input type="text" id="studentId" required placeholder="Enter your ID">
       
        <label for="bookingDate">Select Date</label>
        <input type="date" id="bookingDate" required>

        <label for="duration">Duration</label>
        <select id="duration">
            <option value="2 Hours">2 Hours</option>
            <option value="3 Hours">3 Hours</option>
        </select>

        <label for="roomId">Choose Room ID</label>
        <select id="roomId">
            <option value="R-101">Room 101 (Quiet Study)</option>
            <option value="R-102">Room 102 (Discussion Hub)</option>
            <option value="R-201">Room 201 (Media Room)</option>
        </select>

        <label for="purpose">Priority Category</label>
        <select id="purpose">
            <option value="Exam">Final Exam Prep (High Priority)</option>
            <option value="Project">Group Project (Medium Priority)</option>
            <option value="Casual Reading">General Reading (Low Priority)</option>
        </select>

        <button type="submit" class="btn-submit">Submit Request</button>
    </form>
    <div id="statusMessage" class="status"></div>
</div>

<!-- Admin Control Board -->
<div class="queue-card">
    <h3>Admin Control Board (Pending Requests)</h3>
    <table id="adminTable">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name (ID)</th>
                <th>Date</th>
                <th>Duration</th>
                <th>Room</th>
                <th>Priority</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="adminBody">
            <tr><td colspan="7" style="text-align:center; color:#999;">No pending requests</td></tr>
        </tbody>
    </table>
</div>

<!-- Final Allotted Board -->
<div class="queue-card" style="border-top: 5px solid #28a745;">
    <h3>Confirmed Allotments</h3>
    <table id="allottedTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Room</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="allottedBody">
            <tr><td colspan="5" style="text-align:center; color:#999;">No rooms allotted yet</td></tr>
        </tbody>
    </table>
</div>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('bookingDate').setAttribute('min', today);
    document.getElementById('bookingDate').value = today;

    let pendingQueue = [];
    let allottedList = [];

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
       
        const name = document.getElementById('userName').value;
        const id = document.getElementById('studentId').value;
        const date = document.getElementById('bookingDate').value;
        const duration = document.getElementById('duration').value;
        const room = document.getElementById('roomId').value;
        const purpose = document.getElementById('purpose').value;

        let priorityScore = 3;
        let priorityLabel = "Low";
        if (purpose === "Exam") { priorityScore = 1; priorityLabel = "High"; }
        if (purpose === "Project") { priorityScore = 2; priorityLabel = "Medium"; }

        const newEntry = {
            name, id, date, duration, room, priorityScore, priorityLabel,
            timestamp: Date.now(),
            uid: Date.now() + Math.random() // Unique ID for actions
        };

        pendingQueue.push(newEntry);
        sortQueue();
        updateUI();
       
        this.reset();
        document.getElementById('bookingDate').value = today;
    });

    function sortQueue() {
        pendingQueue.sort((a, b) => {
            if (a.priorityScore !== b.priorityScore) return a.priorityScore - b.priorityScore;
            if (a.date !== b.date) return new Date(a.date) - new Date(b.date);
            return a.timestamp - b.timestamp;
        });
    }

    function approveRequest(uid) {
        const index = pendingQueue.findIndex(req => req.uid === uid);
        if (index > -1) {
            allottedList.push(pendingQueue[index]);
            pendingQueue.splice(index, 1);
            updateUI();
        }
    }

    function rejectRequest(uid) {
        const index = pendingQueue.findIndex(req => req.uid === uid);
        if (index > -1) {
            pendingQueue.splice(index, 1);
            updateUI();
        }
    }

    function updateUI() {
        // Update Admin Table
        const adminBody = document.getElementById('adminBody');
        adminBody.innerHTML = pendingQueue.length ? "" : '<tr><td colspan="7" style="text-align:center; color:#999;">No pending requests</td></tr>';
       
        pendingQueue.forEach((req, index) => {
            const row = adminBody.insertRow();
            const pClass = req.priorityLabel === "High" ? "priority-high" : (req.priorityLabel === "Medium" ? "priority-med" : "priority-low");
            row.innerHTML = `
                <td>#${index + 1}</td>
                <td>${req.name} <br><small>${req.id}</small></td>
                <td>${req.date}</td>
                <td>${req.duration}</td>
                <td>${req.room}</td>
                <td class="${pClass}">${req.priorityLabel}</td>
                <td>
                    <button class="btn-approve" onclick="approveRequest(${req.uid})">Accept</button>
                    <button class="btn-reject" onclick="rejectRequest(${req.uid})">Reject</button>
                </td>
            `;
        });

        // Update Allotted Table
        const allottedBody = document.getElementById('allottedBody');
        allottedBody.innerHTML = allottedList.length ? "" : '<tr><td colspan="5" style="text-align:center; color:#999;">No rooms allotted yet</td></tr>';
       
        allottedList.forEach(req => {
            const row = allottedBody.insertRow();
            row.innerHTML = `
                <td>${req.name}</td>
                <td>${req.date}</td>
                <td>${req.room}</td>
                <td>${req.duration}</td>
                <td class="allotted-status">✓ Confirmed</td>
            `;
        });
    }
</script>

</body>
</html>
